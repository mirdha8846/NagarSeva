<!-- 
  Navigation Shell is suppressed per the "Automatic Suppression" rule for transactional/linear intents like Login.
-->
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-gutter antialiased">
<main class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-lg p-stack-lg shadow-[0_4px_6px_-1px_rgba(15,23,42,0.05),0_2px_4px_-2px_rgba(15,23,42,0.05)]">
<!-- Header Section -->
<header class="text-center mb-stack-lg">
<div aria-hidden="true" class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container text-on-primary-container mb-stack-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">account_balance</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-xs tracking-tight">NagarSeva</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access civic services</p>
</header>
<!-- Form Section -->
<form action="#" class="space-y-stack-md" method="POST">
<!-- Email Input -->
<div class="space-y-unit">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[18px]">mail</span>
</div>
<input autocomplete="email" class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-md text-body-md placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="email" name="email" placeholder="citizen@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-unit">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[18px]">lock</span>
</div>
<input autocomplete="current-password" class="w-full pl-10 pr-3 py-2 bg-surface-container-lowest border border-outline-variant rounded text-on-surface font-body-md text-body-md placeholder:text-outline focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Meta Options -->
<div class="flex items-center justify-between pt-unit">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                        Remember me
                    </label>
</div>
<div class="text-sm">
<a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">
                        Forgot Password?
                    </a>
</div>
</div>
<!-- Primary Action -->
<div class="pt-stack-xs">
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded bg-primary font-label-caps text-label-caps text-on-primary hover:bg-on-primary-fixed-variant focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors uppercase shadow-sm" type="submit">
                    Sign In
                </button>
</div>
</form>
<!-- Divider -->
<div class="mt-stack-lg mb-stack-md relative">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center">
<span class="px-2 bg-surface-container-lowest font-body-sm text-body-sm text-outline">Or continue with</span>
</div>
</div>
<!-- Secondary Action -->
<div>
<button class="w-full flex items-center justify-center py-2.5 px-4 border border-outline-variant rounded bg-surface-container-lowest font-label-caps text-label-caps text-on-surface hover:bg-surface-container-low focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-outline-variant transition-colors uppercase" type="button">
<svg class="w-4 h-4 mr-2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign in with Google
            </button>
</div>
<!-- Footer Link -->
<div class="mt-stack-lg text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-body-sm text-body-sm text-primary hover:text-primary-fixed-dim font-medium transition-colors" href="#">
                    Register here
                </a>
</p>
